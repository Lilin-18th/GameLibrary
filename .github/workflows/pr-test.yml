name: PR Quality Checks

on:
  pull_request:
    branches: [ "master" ]

jobs:
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create local.properties with dummy API key
        run: |
          echo "api_key=dummy_key_for_unit_tests" > local.properties

      - name: Run unit tests
        run: ./gradlew test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/build/reports/tests/
            **/build/test-results/

  detekt:
    name: Static Analysis (Detekt)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      checks: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create local.properties with dummy API key
        run: |
          echo "api_key=dummy_key_for_unit_tests" > local.properties

      - name: Run Detekt
        run: ./gradlew detekt
        continue-on-error: true

      - name: Upload Detekt reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: detekt-reports
          path: |
            **/build/reports/detekt/

      - name: Detekt Review (PR Comments)
        uses: reviewdog/action-detekt@v1
        with:
          github_token: ${{ secrets.BOT_TOKEN }}
          detekt_config: detekt.yml
          level: warning
          reporter: github-pr-review
          filter_mode: nofilter
          fail_on_error: false

  check-results:
    name: Check All Results
    runs-on: ubuntu-latest
    needs: [unit-test, detekt]
    if: always()
    steps:
      - name: Check job results
        run: |
          echo "Unit tests: ${{ needs.unit-test.result }}"
          echo "Detekt: ${{ needs.detekt.result }}"
          if [ "${{ needs.unit-test.result }}" != "success" ]; then
            echo "Unit tests failed!"
            exit 1
          fi